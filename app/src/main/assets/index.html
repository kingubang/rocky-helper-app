<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>洛克百宝箱</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #1a1b2e;
  --bg2: #232540;
  --bg3: #2a2d4a;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --fire: #ff6b6b; --water: #54a0ff; --grass: #5cd85a; --elec: #ffd32a;
  --ice: #74b9ff; --fight: #e17055; --poison: #a29bfe; --ground: #d4a373;
  --rock: #b2bec3; --flying: #dfe6e9; --bug: #b8e994; --steel: #95afc0;
  --cute: #fd79a8; --dark: #636e72; --phantom: #6c5ce7; --light: #ffeaa7;
  --dragon: #6c5ce7; --normal: #b2bec3;
  --text: #dfe6e9; --text2: #b2bec3; --danger: #ff6b6b; --success: #00b894;
  --warn: #fdcb6e;
}
html, body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  width: 100%; height: 100%;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}
html { position:fixed; width:100%; height:100%; overflow:hidden; }

/* 主布局 - 横屏全宽 */
.app-container {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  overflow: hidden;
}

/* 顶部标题栏 - 超紧凑 */
.top-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  background: var(--bg2);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.top-bar .logo { font-size: 16px; }
.top-bar .title { font-size: 13px; font-weight: 700; color: var(--accent2); }

/* Tab栏 - 横向排列 */
.tab-bar {
  display: flex; padding: 3px 10px; gap: 2px;
  flex-shrink: 0;
}
.tab-btn {
  padding: 5px 14px; border: none;
  border-radius: 6px; background: transparent;
  color: var(--text2); font-size: 12px; cursor: pointer;
  transition: background 0.15s;
}
.tab-btn.active { background: var(--accent); color: #fff; }

/* 横屏内容区 - 左右分栏 */
.content-area {
  flex: 1; display: flex; overflow: hidden;
  min-height: 0;
}

/* 左侧面板 - 搜索和列表 */
.left-panel {
  width: 260px; flex-shrink: 0;
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.left-panel .search-box {
  padding: 6px; flex-shrink: 0;
}
.left-panel .search-box input {
  width: 100%; padding: 7px 10px 7px 30px;
  border-radius: 6px; border: 1px solid var(--bg3);
  background: var(--bg2); color: var(--text); font-size: 13px;
  outline: none; -webkit-appearance: none;
}
.left-panel .search-box input:focus { border-color: var(--accent); }
.left-panel .search-box input::placeholder { color: var(--text2); }
.left-panel .search-box .search-icon {
  position: relative; float: left;
  margin-left: 8px; margin-top: -22px;
  color: var(--text2); font-size: 13px;
  pointer-events: none;
}
.left-panel .filter-row {
  display: flex; gap: 2px; flex-wrap: wrap;
  padding: 0 6px 6px; flex-shrink: 0;
}
.filter-tag {
  padding: 3px 6px; border-radius: 4px;
  border: 1px solid var(--bg3); background: transparent;
  color: var(--text2); font-size: 9px; cursor: pointer;
}
.filter-tag.active { border-color: var(--accent); background: rgba(108,92,231,0.2); color: var(--text); }
.left-panel .pet-scroll {
  flex: 1; overflow-y: auto; padding: 0 6px 6px;
  -webkit-overflow-scrolling: touch;
}
.left-panel .pet-scroll::-webkit-scrollbar { width: 2px; }
.left-panel .pet-scroll::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* 右侧面板 - 详情/克制/推荐 */
.right-panel {
  flex: 1; overflow-y: auto; padding: 8px 10px;
  -webkit-overflow-scrolling: touch;
}
.right-panel::-webkit-scrollbar { width: 2px; }
.right-panel::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* 精灵卡片 - 紧凑列表 */
.pet-card {
  background: var(--bg2); border-radius: 8px;
  padding: 6px 8px; margin-bottom: 4px;
  border: 1px solid rgba(255,255,255,0.04);
  cursor: pointer; transition: border-color 0.15s;
}
.pet-card:active { border-color: var(--accent); background: var(--bg3); }
.pet-card .pet-header {
  display: flex; align-items: center; gap: 6px;
}
.pet-card .pet-avatar {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--bg3); display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.pet-card .pet-info { flex: 1; min-width: 0; }
.pet-card .pet-name { font-size: 12px; font-weight: 600; }
.pet-card .pet-no { font-size: 9px; color: var(--text2); }
.pet-card .pet-types { display: flex; gap: 2px; margin-top: 1px; }

/* 属性标签 */
.type-tag {
  display: inline-block; padding: 1px 5px;
  border-radius: 3px; font-size: 9px; font-weight: 600;
  color: #fff; min-width: 20px; text-align: center;
}
.type-normal { background: var(--normal); color: #333; }
.type-fire { background: var(--fire); }
.type-water { background: var(--water); }
.type-grass { background: var(--grass); color: #333; }
.type-elec { background: var(--elec); color: #333; }
.type-ice { background: var(--ice); color: #333; }
.type-fight { background: var(--fight); }
.type-poison { background: var(--poison); }
.type-ground { background: var(--ground); color: #333; }
.type-rock { background: var(--rock); color: #333; }
.type-flying { background: var(--flying); color: #333; }
.type-bug { background: var(--bug); color: #333; }
.type-steel { background: var(--steel); }
.type-cute { background: var(--cute); }
.type-dark { background: var(--dark); }
.type-phantom { background: var(--phantom); }
.type-light { background: var(--light); color: #333; }
.type-dragon { background: var(--dragon); }

/* 精灵详情 - 右侧展示 */
.pet-detail { padding: 4px 0; }
.pet-detail .pd-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 10px;
}
.pet-detail .pd-avatar {
  width: 56px; height: 56px; border-radius: 14px;
  background: var(--bg2); display: flex; align-items: center; justify-content: center;
  font-size: 30px; flex-shrink: 0;
  border: 1px solid var(--bg3);
}
.pet-detail .pd-name { font-size: 18px; font-weight: 700; }
.pet-detail .pd-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.pet-detail .pd-stats {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px;
  margin-bottom: 10px;
}
.stat-item {
  text-align: center; padding: 6px 2px;
  background: var(--bg2); border-radius: 6px;
}
.stat-item .stat-val { font-size: 13px; font-weight: 700; color: var(--accent2); }
.stat-item .stat-label { font-size: 9px; color: var(--text2); }
.pet-detail .pd-desc {
  font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 10px;
}
.pet-detail .pd-section {
  margin-bottom: 8px;
}
.pet-detail .pd-section-title {
  font-size: 11px; font-weight: 600; margin-bottom: 4px;
}
.pet-detail .pd-build {
  background: var(--bg2); border-radius: 8px; padding: 10px;
  border-left: 3px solid var(--success);
}
.pet-detail .pd-build-title {
  font-size: 12px; font-weight: 600; color: var(--success); margin-bottom: 4px;
}
.pet-detail .pd-build-text {
  font-size: 12px; color: var(--text2); line-height: 1.6;
}
.evo-chain {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap; margin-bottom: 8px;
}
.evo-node {
  background: var(--bg2); border-radius: 6px; padding: 4px 10px;
  text-align: center; border: 1px solid var(--bg3);
}
.evo-node .evo-name { font-size: 11px; font-weight: 600; }
.evo-node .evo-no { font-size: 9px; color: var(--text2); }
.evo-arrow { color: var(--accent2); font-size: 14px; }

/* 属性克制 - 双栏并排 */
.type-grid {
  display: grid;
  grid-template-columns: 26px repeat(9, 1fr);
  gap: 1px; margin-bottom: 6px;
}
.type-cell {
  min-height: 20px; border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700; cursor: pointer;
  padding: 1px;
}
.type-cell.header { font-size: 9px; border-radius: 3px; color: #fff; }
.dmg-2 { background: rgba(0, 184, 148, 0.7); color: #fff; }
.dmg-1 { background: rgba(255,255,255,0.05); color: var(--text2); }
.dmg-05 { background: rgba(253, 107, 107, 0.5); color: #fff; }
.dmg-0 { background: rgba(99,110,114,0.4); color: #999; }

.def-query {
  background: var(--bg2); border-radius: 8px; padding: 8px; margin-bottom: 8px;
}
.def-query h3 { font-size: 12px; margin-bottom: 6px; color: var(--accent2); }
.def-types-row { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 6px; }
.def-type-btn {
  padding: 4px 8px; border-radius: 5px;
  border: 2px solid var(--bg3); background: transparent;
  color: var(--text); font-size: 10px; cursor: pointer;
  min-height: 26px; min-width: 26px;
}
.def-type-btn.selected { border-color: var(--accent); background: rgba(108,92,231,0.2); }
.def-result { display: flex; flex-wrap: wrap; gap: 3px; }
.def-result-item {
  display: flex; align-items: center; gap: 2px;
  padding: 3px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 600;
}
.multiplier-2 { background: rgba(0,184,148,0.2); color: var(--success); }
.multiplier-05 { background: rgba(253,107,107,0.2); color: var(--danger); }
.multiplier-0 { background: rgba(99,110,114,0.2); color: #999; }
.multiplier-1 { background: rgba(255,255,255,0.05); color: var(--text2); }

/* 培养推荐 - 卡片横排 */
.rec-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 6px;
}
.tier-section { margin-bottom: 10px; }
.tier-header {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
}
.tier-badge { padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; }
.tier-t0 { background: var(--warn); color: #333; }
.tier-t1 { background: var(--success); color: #fff; }
.tier-t2 { background: var(--accent); color: #fff; }
.rec-card {
  background: var(--bg2); border-radius: 8px;
  padding: 8px; border-left: 3px solid var(--accent);
}
.rec-card .rec-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 3px;
}
.rec-card .rec-name { font-size: 12px; font-weight: 700; }
.rec-card .rec-pos { font-size: 9px; color: var(--text2); }
.rec-card .rec-desc { font-size: 10px; color: var(--text2); margin-bottom: 4px; line-height: 1.4; }
.rec-card .rec-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.rec-tag {
  padding: 1px 5px; border-radius: 3px;
  background: var(--bg3); font-size: 9px; color: var(--text2);
}

.tip-box {
  background: rgba(108,92,231,0.15); border-radius: 6px;
  padding: 5px 8px; margin-bottom: 8px;
  font-size: 10px; color: var(--accent2); line-height: 1.4;
}

/* 占位提示 */
.placeholder-hint {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--text2); font-size: 13px;
  text-align: center; line-height: 1.6;
}
</style>
</head>

  <div class="top-bar">

    <div style="flex:1"></div>

        <div id="recommendList"></div>

    </div>
  </div>
</div>

// ==================== 属性克制 ====================
function getMultiplier(atkType, defType) {
  if (TYPE_CHART[atkType] && TYPE_CHART[atkType][defType] !== undefined) return TYPE_CHART[atkType][defType];
  return 1;
}

function renderTypeGrid() {
  var grid = document.getElementById('typeGrid');
  var first9 = TYPES.slice(0, 9), last9 = TYPES.slice(9);
  var html = '<div class="type-grid"><div class="type-cell"></div>';
  for (var i = 0; i < first9.length; i++) html += '<div class="type-cell header type-' + TYPE_CLASS[first9[i]] + '">' + TYPE_ABBR[first9[i]] + '</div>';
  for (var a = 0; a < TYPES.length; a++) {
    html += '<div class="type-cell header type-' + TYPE_CLASS[TYPES[a]] + '">' + TYPE_ABBR[TYPES[a]] + '</div>';
    for (var d = 0; d < first9.length; d++) {
      var m = getMultiplier(TYPES[a], first9[d]), cls = m >= 2 ? 'dmg-2' : m === 0 ? 'dmg-0' : m <= 0.5 ? 'dmg-05' : 'dmg-1';
      html += '<div class="type-cell ' + cls + '" title="' + TYPES[a] + '→' + first9[d] + ':×' + m + '">' + (m === 1 ? '' : m) + '</div>';
    }
  }
  html += '</div><div class="type-grid"><div class="type-cell"></div>';
  for (var i2 = 0; i2 < last9.length; i2++) html += '<div class="type-cell header type-' + TYPE_CLASS[last9[i2]] + '">' + TYPE_ABBR[last9[i2]] + '</div>';
  for (var a2 = 0; a2 < TYPES.length; a2++) {
    html += '<div class="type-cell header type-' + TYPE_CLASS[TYPES[a2]] + '">' + TYPE_ABBR[TYPES[a2]] + '</div>';
    for (var d2 = 0; d2 < last9.length; d2++) {
      var m2 = getMultiplier(TYPES[a2], last9[d2]), cls2 = m2 >= 2 ? 'dmg-2' : m2 === 0 ? 'dmg-0' : m2 <= 0.5 ? 'dmg-05' : 'dmg-1';
      html += '<div class="type-cell ' + cls2 + '" title="' + TYPES[a2] + '→' + last9[d2] + ':×' + m2 + '">' + (m2 === 1 ? '' : m2) + '</div>';
    }
  }
  html += '</div>';
  grid.innerHTML = html;
}

var selectedDefTypes = [];
function renderDefQuery() {
  var row = document.getElementById('defTypeRow'), html = '';
  for (var i = 0; i < TYPES.length; i++) html += '<button class="def-type-btn type-' + TYPE_CLASS[TYPES[i]] + '" data-type="' + TYPES[i] + '" onclick="toggleDefType(this,\'' + TYPES[i] + '\')">' + TYPE_ABBR[TYPES[i]] + '</button>';
  row.innerHTML = html;
}
function toggleDefType(btn, type) {
  var idx = selectedDefTypes.indexOf(type);
  if (idx >= 0) { selectedDefTypes.splice(idx, 1); btn.classList.remove('selected'); }
  else {
    if (selectedDefTypes.length >= 2) { var rm = selectedDefTypes.shift(); var ob = document.querySelector('.def-type-btn[data-type="' + rm + '"]'); if (ob) ob.classList.remove('selected'); }
    selectedDefTypes.push(type); btn.classList.add('selected');
  }
  updateDefResult();
}
function updateDefResult() {
  var container = document.getElementById('defResult');
  if (!selectedDefTypes.length) { container.innerHTML = '<span style="color:var(--text2);font-size:10px;">👆 点击属性标签</span>'; return; }
  var results = [];
  for (var i = 0; i < TYPES.length; i++) { var mult = 1; for (var j = 0; j < selectedDefTypes.length; j++) mult *= getMultiplier(TYPES[i], selectedDefTypes[j]); results.push({type: TYPES[i], mult: mult}); }
  results.sort(function(a,b) { return b.mult - a.mult; });
  var html = '<div style="width:100%;font-size:10px;color:var(--text2);margin-bottom:4px;">🛡️ ' + selectedDefTypes.join('+') + ' 防御面：</div>';
  var w = results.filter(function(r) { return r.mult >= 2; });
  var im = results.filter(function(r) { return r.mult === 0; });
  var re = results.filter(function(r) { return r.mult <= 0.5 && r.mult > 0; });
  if (w.length) { html += '<div style="font-size:10px;color:var(--danger);font-weight:600;margin-bottom:3px;">⚠️ 弱点</div>'; for (var i = 0; i < w.length; i++) html += '<div class="def-result-item multiplier-2"><span class="type-tag type-' + TYPE_CLASS[w[i].type] + '">' + TYPE_ABBR[w[i].type] + '</span> ×' + w[i].mult + '</div>'; }
  if (im.length) { html += '<div style="font-size:10px;color:#999;font-weight:600;margin:4px 0 3px;">🛡️ 免疫</div>'; for (var i = 0; i < im.length; i++) html += '<div class="def-result-item multiplier-0"><span class="type-tag type-' + TYPE_CLASS[im[i].type] + '">' + TYPE_ABBR[im[i].type] + '</span> ×0</div>'; }
  if (re.length) { html += '<div style="font-size:10px;color:var(--success);font-weight:600;margin:4px 0 3px;">✅ 抗性</div>'; for (var i = 0; i < re.length; i++) html += '<div class="def-result-item multiplier-05"><span class="type-tag type-' + TYPE_CLASS[re[i].type] + '">' + TYPE_ABBR[re[i].type] + '</span> ×' + re[i].mult + '</div>'; }
  container.innerHTML = html;
}

var currentTypeFilter = '';
function renderTypeFilter() {
  var row = document.getElementById('typeFilter'), html = '<button class="filter-tag active" data-type="" onclick="filterByType(this,\'\')">全部</button>';

function filterByType(btn, type) {
  document.querySelectorAll('.filter-tag').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  currentTypeFilter = type;
  renderPetList();
}
function renderPetList() {
  var container = document.getElementById('petList');
  var search = document.getElementById('petSearch').value.toLowerCase();
  var filtered = PETS.filter(function(p) {
    return (!currentTypeFilter || p.type.indexOf(currentTypeFilter) >= 0) && (!search || p.name.toLowerCase().indexOf(search) >= 0 || p.id.indexOf(search) >= 0);
  });
  var tierOrder = {'T0':0,'T1':1,'T2':2,'T3':3,'T5':4};
  filtered.sort(function(a,b) { return (tierOrder[a.tier]||9) - (tierOrder[b.tier]||9); });
  if (!filtered.length) { container.innerHTML = '<div style="text-align:center;padding:20px 0;color:var(--text2);font-size:11px;">没有找到</div>'; return; }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var p = filtered[i];
    var tc = p.tier === 'T0' ? 'var(--warn)' : p.tier === 'T1' ? 'var(--success)' : p.tier === 'T2' ? 'var(--accent)' : 'var(--text2)';
    var emojis = '', tags = '';
    for (var j = 0; j < p.type.length; j++) { emojis += TYPE_EMOJI[p.type[j]]; tags += '<span class="type-tag type-' + TYPE_CLASS[p.type[j]] + '">' + p.type[j] + '</span>'; }
    html += '<div class="pet-card" onclick="showPetDetail(\'' + p.id + '\')"><div class="pet-header"><div class="pet-avatar">' + emojis + '</div><div class="pet-info"><div class="pet-name">' + p.name + ' <span style="font-size:9px;color:' + tc + ';font-weight:700;">' + p.tier + '</span></div><div class="pet-no">' + p.total + '</div><div class="pet-types">' + tags + '</div></div></div></div>';
  }
  container.innerHTML = html;
}
document.getElementById('petSearch').addEventListener('input', renderPetList);

function showPetDetail(id) {
  var p = null;
  for (var i = 0; i < PETS.length; i++) { if (PETS[i].id === id) { p = PETS[i]; break; } }
  if (!p) return;
  // 高亮左侧选中项
  document.querySelectorAll('.pet-card').forEach(function(c) { c.style.borderColor = ''; });
  event.currentTarget.style.borderColor = 'var(--accent)';

  document.getElementById('detailPlaceholder').style.display = 'none';
  var detail = document.getElementById('petDetail');
  detail.style.display = 'block';
  var tc = p.tier === 'T0' ? 'var(--warn)' : p.tier === 'T1' ? 'var(--success)' : p.tier === 'T2' ? 'var(--accent)' : 'var(--text2)';
  var emojis = '', typeTags = '';
  for (var j = 0; j < p.type.length; j++) { emojis += TYPE_EMOJI[p.type[j]]; typeTags += '<span class="type-tag type-' + TYPE_CLASS[p.type[j]] + '">' + p.type[j] + '</span> '; }

  var evoHtml = '';
  if (p.evo.length > 1) {
    evoHtml = '<div class="evo-chain">';
    for (var i = 0; i < p.evo.length; i++) {
      if (i > 0) evoHtml += '<span class="evo-arrow">→</span>';
      var parts = p.evo[i].split(':');
      evoHtml += '<div class="evo-node"><div class="evo-name">' + parts[1] + '</div><div class="evo-no">' + parts[0] + '</div></div>';
    }
    evoHtml += '</div>';
  }

  var weakHtml = '', resistHtml = '', immuneHtml = '';
  for (var d = 0; d < p.type.length; d++) {
    for (var a = 0; a < TYPES.length; a++) {
      var m = getMultiplier(TYPES[a], p.type[d]);
      if (m >= 2 && weakHtml.indexOf(TYPES[a]) < 0) weakHtml += '<span class="type-tag type-' + TYPE_CLASS[TYPES[a]] + '">' + TYPES[a] + ' ×' + m + '</span> ';
      if (m <= 0.5 && m > 0 && resistHtml.indexOf(TYPES[a]) < 0) resistHtml += '<span class="type-tag type-' + TYPE_CLASS[TYPES[a]] + '">' + TYPES[a] + ' ×' + m + '</span> ';
      if (m === 0 && immuneHtml.indexOf(TYPES[a]) < 0) immuneHtml += '<span class="type-tag type-' + TYPE_CLASS[TYPES[a]] + '">' + TYPES[a] + ' ×0</span> ';
    }
  }

  var buildHtml = '';
  if (p.recBuild) {
    buildHtml = '<div class="pd-build"><div class="pd-build-title">📝 培养方案</div><div class="pd-build-text">' + p.recBuild + '</div></div>';
  }

  detail.innerHTML =
    '<div class="pd-header"><div class="pd-avatar">' + emojis + '</div><div><div class="pd-name">' + p.name + ' <span style="color:' + tc + ';font-size:14px;">' + p.tier + '</span></div><div class="pd-sub">NO.' + p.id + ' · ' + p.type.join('/') + ' · 总种族值 ' + p.total + '</div><div style="margin-top:4px;">' + typeTags + '</div></div></div>' +
    evoHtml +
    '<div class="pd-stats"><div class="stat-item"><div class="stat-val">' + p.hp + '</div><div class="stat-label">HP</div></div><div class="stat-item"><div class="stat-val">' + p.atk + '</div><div class="stat-label">物攻</div></div><div class="stat-item"><div class="stat-val">' + p.def + '</div><div class="stat-label">物防</div></div><div class="stat-item"><div class="stat-val">' + p.spa + '</div><div class="stat-label">魔攻</div></div><div class="stat-item"><div class="stat-val">' + p.spd + '</div><div class="stat-label">速度</div></div><div class="stat-item"><div class="stat-val">' + p.spe + '</div><div class="stat-label">防御</div></div></div>' +
    '<div class="pd-desc">' + p.desc + '</div>' +
    (weakHtml ? '<div class="pd-section"><div class="pd-section-title" style="color:var(--danger);">⚠️ 弱点</div>' + weakHtml + '</div>' : '') +
    (immuneHtml ? '<div class="pd-section"><div class="pd-section-title" style="color:#999;">🛡️ 免疫</div>' + immuneHtml + '</div>' : '') +
    (resistHtml ? '<div class="pd-section"><div class="pd-section-title" style="color:var(--success);">✅ 抗性</div>' + resistHtml + '</div>' : '') +
    buildHtml;

  // 切换到图鉴Tab
  if (currentTab !== 'pokedex') {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelector('[data-tab="pokedex"]').classList.add('active');
    document.querySelectorAll('.tab-page').forEach(function(pg) { pg.style.display = 'none'; });
    document.getElementById('page-pokedex').style.display = 'block';
    document.getElementById('leftPanel').style.display = 'flex';
    currentTab = 'pokedex';
  }
}

  for (var g = 0; g < RECOMMEND.length; g++) {
    var group = RECOMMEND[g];
    html += '<div class="tier-section"><div class="tier-header"><span class="tier-badge tier-' + group.tier.toLowerCase() + '">' + group.tier + '</span><span style="font-size:10px;color:var(--text2);">' + group.pets.length + '只</span></div><div class="rec-grid">';
    for (var i = 0; i < group.pets.length; i++) {
      var pet = group.pets[i], emojis = '', typeTags = '', tags = '';
      for (var j = 0; j < pet.type.length; j++) { emojis += TYPE_EMOJI[pet.type[j]]; typeTags += '<span class="type-tag type-' + TYPE_CLASS[pet.type[j]] + '">' + pet.type[j] + '</span> '; }
      for (var t = 0; t < pet.tags.length; t++) tags += '<span class="rec-tag">' + pet.tags[t] + '</span>';
      html += '<div class="rec-card"><div class="rec-header"><div class="rec-name">' + emojis + ' ' + pet.name + '</div><div class="rec-pos">' + pet.pos + '</div></div><div style="display:flex;gap:2px;margin-bottom:3px;">' + typeTags + '</div><div class="rec-desc">' + pet.desc + '</div><div class="rec-tags">' + tags + '</div></div>';
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

// ==================== 初始化 ====================
renderTypeGrid();
renderDefQuery();
renderTypeFilter();
renderPetList();
renderRecommend();

// 默认选中第一个T0精灵
if (PETS.length) showPetDetailById(PETS[0].id);
function showPetDetailById(id) {
  var cards = document.querySelectorAll('.pet-card');
  if (cards.length) { cards[0].style.borderColor = 'var(--accent)'; }
  document.getElementById('detailPlaceholder').style.display = 'none';
  var p = PETS[0];
  if (!p) return;
  var detail = document.getElementById('petDetail');
  detail.style.display = 'block';
  // trigger showPetDetail logic without event
  var tc = p.tier === 'T0' ? 'var(--warn)' : p.tier === 'T1' ? 'var(--success)' : 'var(--text2)';
  var emojis = '', typeTags = '';
  for (var j = 0; j < p.type.length; j++) { emojis += TYPE_EMOJI[p.type[j]]; typeTags += '<span class="type-tag type-' + TYPE_CLASS[p.type[j]] + '">' + p.type[j] + '</span> '; }
  var evoHtml = '';
  if (p.evo.length > 1) { evoHtml = '<div class="evo-chain">'; for (var i = 0; i < p.evo.length; i++) { if (i > 0) evoHtml += '→'; var parts = p.evo[i].split(':'); evoHtml += '<div class="evo-node"><div class="evo-name">' + parts[1] + '</div><div class="evo-no">' + parts[0] + '</div></div>'; } evoHtml += '</div>'; }
  var weakHtml = '', resistHtml = '', immuneHtml = '';
  for (var d = 0; d < p.type.length; d++) { for (var a = 0; a < TYPES.length; a++) { var m = getMultiplier(TYPES[a], p.type[d]); if (m >= 2 && weakHtml.indexOf(TYPES[a]) < 0) weakHtml += '<span class="type-tag type-' + TYPE_CLASS[TYPES[a]] + '">' + TYPES[a] + ' ×' + m + '</span> '; if (m <= 0.5 && m > 0 && resistHtml.indexOf(TYPES[a]) < 0) resistHtml += '<span class="type-tag type-' + TYPE_CLASS[TYPES[a]] + '">' + TYPES[a] + ' ×' + m + '</span> '; if (m === 0 && immuneHtml.indexOf(TYPES[a]) < 0) immuneHtml += '<span class="type-tag type-' + TYPE_CLASS[TYPES[a]] + '">' + TYPES[a] + ' ×0</span> '; } }
  var buildHtml = p.recBuild ? '<div class="pd-build"><div class="pd-build-title">📝 培养方案</div><div class="pd-build-text">' + p.recBuild + '</div></div>' : '';
  detail.innerHTML = '<div class="pd-header"><div class="pd-avatar">' + emojis + '</div><div><div class="pd-name">' + p.name + ' <span style="color:' + tc + ';font-size:14px;">' + p.tier + '</span></div><div class="pd-sub">NO.' + p.id + ' · ' + p.type.join('/') + ' · 总' + p.total + '</div><div style="margin-top:4px;">' + typeTags + '</div></div></div>' + evoHtml + '<div class="pd-stats"><div class="stat-item"><div class="stat-val">' + p.hp + '</div><div class="stat-label">HP</div></div><div class="stat-item"><div class="stat-val">' + p.atk + '</div><div class="stat-label">物攻</div></div><div class="stat-item"><div class="stat-val">' + p.def + '</div><div class="stat-label">物防</div></div><div class="stat-item"><div class="stat-val">' + p.spa + '</div><div class="stat-label">魔攻</div></div><div class="stat-item"><div class="stat-val">' + p.spd + '</div><div class="stat-label">速度</div></div><div class="stat-item"><div class="stat-val">' + p.spe + '</div><div class="stat-label">防御</div></div></div><div class="pd-desc">' + p.desc + '</div>' + (weakHtml ? '<div class="pd-section"><div class="pd-section-title" style="color:var(--danger);">⚠️ 弱点</div>' + weakHtml + '</div>' : '') + (immuneHtml ? '<div class="pd-section"><div class="pd-section-title" style="color:#999;">🛡️ 免疫</div>' + immuneHtml + '</div>' : '') + (resistHtml ? '<div class="pd-section"><div class="pd-section-title" style="color:var(--success);">✅ 抗性</div>' + resistHtml + '</div>' : '') + buildHtml;
}
</script>
